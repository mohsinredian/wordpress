name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build PHP Image

        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/wordpress-php:latest \
            ./docker/php

      - name: Build Nginx Image

        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/wordpress-nginx:latest \
            ./docker/nginx

      - name: Push PHP Image

        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/wordpress-php:latest

      - name: Push Nginx Image

        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/wordpress-nginx:latest

      - name: Deploy Server

        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            cd /opt/wordpress

            docker compose pull

            docker compose up -d
